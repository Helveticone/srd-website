# ============================================================================
#  Worker Edge API — Scores football.ch live
#  Déployé sur : api.srd.ch/scores
# ============================================================================
name = "srd-scores-live"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# Cache KV pour les scores (TTL court)
# [[kv_namespaces]]
# binding = "SCORES_CACHE"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[vars]
FOOTBALL_CH_BASE = "https://www.football.ch"
CACHE_TTL_SECONDS = "60"

# Cron : rafraîchissement périodique pendant les matchs (optionnel)
# [triggers]
# crons = ["*/2 * * * *"]

[observability]
enabled = true
